version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://shopmind:shopmind@db:5432/shopmind
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-real-prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
      - VECTOR_STORE_TYPE=milvus
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --pool=solo
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://shopmind:shopmind@db:5432/shopmind
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-real-prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
      - VECTOR_STORE_TYPE=milvus
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: shopmind
      POSTGRES_PASSWORD: shopmind
      POSTGRES_DB: shopmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus

volumes:
  postgres_data:
  redis_data:
  milvus_data:
